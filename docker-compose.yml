version: '3.9'

services:
  # ─── PostgreSQL + TimescaleDB ───
  postgres:
    image: timescale/timescaledb:latest-pg16
    container_name: mprofit-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: mprofit
      POSTGRES_USER: mprofit_admin
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mprofit_dev_2024}
    ports:
      - '5433:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/docker/init-db.sql:/docker-entrypoint-initdb.d/01-init.sql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U mprofit_admin -d mprofit']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - mprofit-network

  # ─── Redis ───
  redis:
    image: redis:7-alpine
    container_name: mprofit-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-mprofit_redis_2024} --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', '-a', '${REDIS_PASSWORD:-mprofit_redis_2024}', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - mprofit-network

  # ─── Kafka (KRaft mode, no Zookeeper) ───
  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: mprofit-kafka
    restart: unless-stopped
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENERS: PLAINTEXT://kafka:29092,CONTROLLER://kafka:29093,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:29093
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    ports:
      - '9092:9092'
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ['CMD', 'kafka-topics', '--bootstrap-server', 'kafka:29092', '--list']
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - mprofit-network

  # ─── OpenSearch ───
  opensearch:
    image: opensearchproject/opensearch:2.13.0
    container_name: mprofit-opensearch
    restart: unless-stopped
    environment:
      discovery.type: single-node
      OPENSEARCH_INITIAL_ADMIN_PASSWORD: ${OPENSEARCH_PASSWORD:-MProfit@Search2024}
      DISABLE_INSTALL_DEMO_CONFIG: 'true'
      DISABLE_SECURITY_PLUGIN: 'true'
      OPENSEARCH_JAVA_OPTS: '-Xms512m -Xmx512m'
    ports:
      - '9200:9200'
      - '9600:9600'
    volumes:
      - opensearch_data:/usr/share/opensearch/data
    healthcheck:
      test: ['CMD-SHELL', 'curl -s http://localhost:9200/_cluster/health | grep -q green || curl -s http://localhost:9200/_cluster/health | grep -q yellow']
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - mprofit-network

  # ─── MinIO (S3-compatible storage) ───
  minio:
    image: minio/minio:latest
    container_name: mprofit-minio
    restart: unless-stopped
    command: server /data --console-address ':9001'
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-mprofit_minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-mprofit_minio_2024}
    ports:
      - '9000:9000'
      - '9001:9001'
    volumes:
      - minio_data:/data
    healthcheck:
      test: ['CMD', 'mc', 'ready', 'local']
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - mprofit-network

  # ─── NGINX API Gateway ───
  nginx:
    image: nginx:alpine
    container_name: mprofit-nginx
    restart: unless-stopped
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./infra/nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - api
      - web
    networks:
      - mprofit-network

  # ─── NestJS API ───
  api:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.api
    container_name: mprofit-api
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://mprofit_admin:${POSTGRES_PASSWORD:-mprofit_dev_2024}@postgres:5432/mprofit?schema=public
      REDIS_URL: redis://default:${REDIS_PASSWORD:-mprofit_redis_2024}@redis:6379
      KAFKA_BROKERS: kafka:29092
      OPENSEARCH_URL: http://opensearch:9200
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-mprofit_minio}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-mprofit_minio_2024}
      JWT_SECRET: ${JWT_SECRET:-mprofit_jwt_secret_change_in_production}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-sk-mock-key}
    ports:
      - '4000:4000'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - mprofit-network

  # ─── Next.js Web App ───
  web:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.web
    container_name: mprofit-web
    restart: unless-stopped
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: http://localhost:4000
      NEXT_PUBLIC_WS_URL: ws://localhost:4000
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-mprofit_nextauth_secret_change_in_production}
      NEXTAUTH_URL: http://localhost:3000
    ports:
      - '3000:3000'
    depends_on:
      - api
    networks:
      - mprofit-network

volumes:
  postgres_data:
  redis_data:
  kafka_data:
  opensearch_data:
  minio_data:

networks:
  mprofit-network:
    driver: bridge
